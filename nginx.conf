server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # CSP header — must be set here so reverse proxies don't override the meta tag
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://api.stripe.com https://api.nikolaospapageorgiou.de; frame-src 'self' https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    location / {
        # This is the magic line for Angular routing:
        # It tells Nginx: "Try to find the file the user asked for.
        # If you can't find it, just give them index.html and let Angular handle it."
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets to make the site faster
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}